# Space Heard Us — Decap CMS config
# After saving here, go to https://yoursite.com/admin/ to edit content.
# You will log in with GitHub; changes commit to the repo and trigger a new deploy.

backend:
  name: github
  repo: soldisn2025-png/spaceheardus-v3
  branch: main

media_folder: "public/images"
public_path: "/images"

locale: "en"

publish_mode: simple

collections:
  - name: site
    label: Site settings
    file: "content/site.json"
    fields:
      - { label: Name, name: name, widget: string }
      - { label: Tagline, name: tagline, widget: string }
      - { label: Domain, name: domain, widget: string }
      - { label: Email, name: email, widget: string }
      - { label: Secondary email, name: emailSecondary, widget: string }
      - { label: Phone, name: phone, widget: string, required: false }
      - { label: Address, name: address, widget: string, required: false }
      - { label: Description, name: description, widget: text }
      - { label: Founded, name: founded, widget: string }
      - { label: Nonprofit notice, name: nonprofitNotice, widget: string }

  - name: team
    label: Team
    file: "content/team.json"
    description: "Team member order is determined by the order field (1, 2, 3...)."
    fields:
      - label: Members
        name: members
        widget: list
        fields:
          - { label: ID, name: id, widget: string, hint: "Lowercase, e.g. courtney-lee" }
          - { label: Name, name: name, widget: string }
          - { label: Role, name: role, widget: string, hint: "e.g. Leader & Violin, Piano" }
          - { label: Short bio, name: shortBio, widget: text }
          - { label: Extended story, name: extendedStory, widget: text, required: false }
          - { label: Image, name: image, widget: image, hint: "Upload or use path like /images/team/name.png" }
          - { label: Order, name: order, widget: number }

  - name: events
    label: Events
    file: "content/events.json"
    fields:
      - label: Events
        name: events
        widget: list
        fields:
          - { label: ID, name: id, widget: string }
          - { label: Title, name: title, widget: string }
          - { label: Date, name: date, widget: string, hint: "YYYY-MM-DD" }
          - { label: Time, name: time, widget: string }
          - { label: Location, name: location, widget: string }
          - { label: Location detail, name: locationDetail, widget: string, required: false }
          - { label: Description, name: description, widget: text }
          - { label: Type, name: type, widget: select, options: [performance, rehearsal, community, other] }
          - { label: RSVP link, name: rsvpLink, widget: string, required: false }
          - { label: RSVP label, name: rsvpLabel, widget: string, required: false }
          - { label: Coming soon?, name: isComingSoon, widget: boolean, default: false, required: false }
